version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: onera
      POSTGRES_USER: onera
      POSTGRES_PASSWORD: onera
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onera"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://onera:onera@postgres:5432/onera
      REDIS_URL: redis://redis:6379
      BACKEND_PORT: "3001"
      FRONTEND_URL: http://localhost:3000
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-4o}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_AZURE_RESOURCE_NAME: ${AI_AZURE_RESOURCE_NAME:-}
      AI_AZURE_DEPLOYMENT_NAME: ${AI_AZURE_DEPLOYMENT_NAME:-}
      AGENT_LOOP_INTERVAL_CRON: ${AGENT_LOOP_INTERVAL_CRON:-0 */4 * * *}
      DAILY_REPORT_CRON: ${DAILY_REPORT_CRON:-0 18 * * *}
      EXA_API_KEY: ${EXA_API_KEY:-}
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://backend:3001
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /login
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /new
    ports:
      - "3000:3000"

volumes:
  pgdata:
  redisdata:
