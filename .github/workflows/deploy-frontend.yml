# =============================================================================
# Deploy Frontend → Azure Static Web App (onera-prod-frontend)
# =============================================================================
# Triggers:
#   - Push to main when frontend or shared packages change
#   - Manual dispatch (deploy any time)
# =============================================================================
name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "packages/frontend/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.0"

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @onera/shared run build

      - name: Build frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: https://orchestrator-api.onera.chat
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /login
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /new
          NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL: /home
        run: pnpm --filter @onera/frontend run build

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: packages/frontend
          output_location: .next
          skip_app_build: true
