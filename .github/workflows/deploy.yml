name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: "Force deploy backend"
        type: boolean
        default: false
      deploy_frontend:
        description: "Force deploy frontend"
        type: boolean
        default: false

env:
  ACR_LOGIN_SERVER: oneraacr.azurecr.io
  RESOURCE_GROUP: onera

jobs:
  # -------------------------------------------------------------------
  # Detect which packages changed
  # -------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'packages/backend/**'
              - 'packages/database/**'
              - 'packages/shared/**'
              - 'packages/ai/**'
              - 'packages/tools/**'
              - 'packages/agents/**'
              - 'pnpm-lock.yaml'
            frontend:
              - 'packages/frontend/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'

  # -------------------------------------------------------------------
  # Build & deploy backend
  # -------------------------------------------------------------------
  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event.inputs.deploy_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push backend image
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/onera-operator-backend:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/onera-operator-backend:latest \
            -f packages/backend/Dockerfile \
            .
          docker push ${{ env.ACR_LOGIN_SERVER }}/onera-operator-backend:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/onera-operator-backend:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp config container set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name onera-operator-backend \
            --container-image-name ${{ env.ACR_LOGIN_SERVER }}/onera-operator-backend:${{ github.sha }} \
            --container-registry-url https://${{ env.ACR_LOGIN_SERVER }} \
            --container-registry-user ${{ secrets.ACR_USERNAME }} \
            --container-registry-password ${{ secrets.ACR_PASSWORD }}

          az webapp restart \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name onera-operator-backend

      - name: Wait for health check
        run: |
          echo "Waiting for backend to start..."
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://operator-api.onera.chat/api/health || true)
            if [ "$status" = "200" ]; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i: HTTP $status — retrying in 10s..."
            sleep 10
          done
          echo "Backend health check failed after 5 minutes"
          exit 1

  # -------------------------------------------------------------------
  # Build & deploy frontend
  # -------------------------------------------------------------------
  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event.inputs.deploy_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push frontend image
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/onera-operator-frontend:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/onera-operator-frontend:latest \
            -f packages/frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_BACKEND_URL=https://operator-api.onera.chat \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }} \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_URL=/login \
            --build-arg NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard \
            --build-arg NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/new \
            --build-arg NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL=/home \
            .
          docker push ${{ env.ACR_LOGIN_SERVER }}/onera-operator-frontend:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/onera-operator-frontend:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp config container set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name onera-operator-frontend \
            --container-image-name ${{ env.ACR_LOGIN_SERVER }}/onera-operator-frontend:${{ github.sha }} \
            --container-registry-url https://${{ env.ACR_LOGIN_SERVER }} \
            --container-registry-user ${{ secrets.ACR_USERNAME }} \
            --container-registry-password ${{ secrets.ACR_PASSWORD }}

          az webapp restart \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name onera-operator-frontend

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend to start..."
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://operator.onera.chat || true)
            if [ "$status" = "200" ] || [ "$status" = "307" ] || [ "$status" = "302" ]; then
              echo "Frontend is live! (HTTP $status)"
              exit 0
            fi
            echo "Attempt $i: HTTP $status — retrying in 10s..."
            sleep 10
          done
          echo "Frontend health check failed after 5 minutes"
          exit 1
